services:
  - type: web
    name: risklens-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w @risklens/shared && npm run build -w @risklens/api && npm run db:deploy -w @risklens/api
    startCommand: npm run start -w @risklens/api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false
      - key: PORT
        value: 4000
